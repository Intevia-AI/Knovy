services:
  proxy-server:
    # Build the image from the Dockerfile in the current directory.
    build: .
    # Name the container for easier identification.
    container_name: intevia-proxy-local
    # Always restart the container unless it is stopped manually.
    restart: unless-stopped
    # Load environment variables from a .env file in this directory.
    env_file:
      - .env
    # Map the host port to the container port.
    ports:
      - "4567:4567"