version: '3.8'

services:
  proxy-server:
    build:
      context: . # Use the current directory (apps/web) as the build context
      dockerfile: Dockerfile # Specify the Dockerfile name
    container_name: intevia-proxy-server
    restart: unless-stopped
    ports:
      # Map host port 8080 to container port 8080 (or the value of PROXY_PORT)
      # Format: "HOST_PORT:CONTAINER_PORT"
      - "${PROXY_PORT:-8080}:${PROXY_PORT:-8080}"
    environment:
      # Pass the API key securely. Best practice is to use environment variables
      # on the host machine or a .env file read by docker-compose.
      # Example using a .env file in the same directory as docker-compose.yml:
      # Create a .env file with:
      # GOOGLE_GENERATIVE_AI_API_KEY=your_api_key_here
      # PROXY_PORT=8080
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY}
      PROXY_PORT: ${PROXY_PORT:-8080} # Default to 8080 if not set
    # Optional: Add volume mounts if needed, e.g., for logs
    # volumes:
    #   - ./logs:/app/logs

# Note: Create a .env file in this directory (/Users/yeyouming/Desktop/intevia-ai/apps/web/)
# with the following content:
#
# GOOGLE_GENERATIVE_AI_API_KEY=YOUR_ACTUAL_GOOGLE_API_KEY
# PROXY_PORT=8080 # Or your desired port
#
# Make sure this .env file is NOT committed to version control if it contains secrets.
# Alternatively, set these environment variables directly on your VPS host system.

