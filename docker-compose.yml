services:
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - my_network
    platform: linux/amd64
    mem_limit: 4g
    memswap_limit: 6g
    env_file:
      - ./apps/web/.env

networks:
  my_network:
    name: my_network
    driver: bridge
