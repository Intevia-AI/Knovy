name: Staging Build

on:
  push:
    branches:
      - stg

jobs:
  staging-build:
    runs-on: macos-latest # Mirrors the production release runner.
    environment: Production # Provides the Apple signing secrets for full-signed staging builds.

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run config tests
        run: pnpm test:run

      - name: Apply staging version suffix
        working-directory: apps/app
        run: |
          BASE=$(node -p "require('./package.json').version")
          npm version "${BASE}-stg.${{ github.run_number }}" --no-git-tag-version --allow-same-version

      - name: Build staging app (signed, not published)
        env:
          # Apple code signing / notarization secrets (same as the production release).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: pnpm --filter Knovy run build:staging
