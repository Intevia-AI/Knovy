name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: macos-latest # This workflow is configured for macOS releases.
    environment: Production
    permissions:
      contents: write # Required for GITHUB_TOKEN to create releases in this repository.

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Verify tag matches app version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          test "$TAG" = "$PKG" || { echo "::error::Tag v$TAG does not match package.json version $PKG"; exit 1; }

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pre-create GitHub release
        # electron-builder publishes the dmg and zip concurrently. When the release does
        # not yet exist, both tasks call "create release" and one fails with 422
        # already_exists, aborting before latest-mac.yml uploads (breaking auto-update).
        # Creating the release up front means both tasks only ever upload to it.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; skipping create."
          else
            gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --generate-notes
          fi

      - name: Build and Publish
        env:
          # This token is used to create a release in this repository.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # The following secrets are required for macOS code signing and notarization.
          # You will need to create them in your repository's secrets.
          # See: https://www.electron.build/code-signing
          #
          APPLE_ID: ${{ secrets.APPLE_ID }} # Your Apple Developer ID
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }} # An app-specific password for your Apple ID
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }} # Your Apple Developer Team ID
          CSC_LINK: ${{ secrets.CSC_LINK }} # Base64 encoded .p12 certificate
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }} # Password for the certificate
        run: pnpm run build:ci

      - name: Verify macOS auto-update zip integrity
        # Squirrel/ShipIt validates the new app's code signature before swapping the
        # bundle. If the *-mac.zip was created with its framework symlinks flattened
        # (Versions/Current, Squirrel, Resources stored as real files instead of
        # symlinks), the bundle fails `codesign --verify --deep --strict` and ShipIt
        # silently rejects the update and relaunches the old version. Fail the release
        # loudly here so a non-installable auto-update zip is never shipped unnoticed.
        run: |
          set -euo pipefail
          ZIP=$(ls dist/*-mac.zip | head -1)
          echo "Inspecting $ZIP"
          SYMLINKS=$(zipinfo "$ZIP" | awk '/^l/ {c++} END {print c+0}')
          echo "symlink entries in zip: $SYMLINKS"
          if [ "$SYMLINKS" -eq 0 ]; then
            echo "::error::macOS auto-update zip has 0 symlinks — framework structure was flattened; Squirrel/ShipIt will reject the update. Do not ship this build."
            exit 1
          fi
          WORK=$(mktemp -d)
          ditto -x -k "$ZIP" "$WORK"
          APP=$(find "$WORK" -maxdepth 2 -name '*.app' | head -1)
          echo "Verifying code signature of $APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "✅ Auto-update zip OK: framework symlinks intact and signature valid."
